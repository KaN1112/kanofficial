<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KaN Official Site | お問い合わせ</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark"><img src="kan-icon.jpg" alt="KaNアイコン"></span>
        <span class="brand-text">KaN Official Site <span>WEISER ESPORTS</span></span>
      </a>
      <nav aria-label="メインナビゲーション">
        <ul class="nav-list">
          <li><a href="index.html">ホーム</a></li>
          <li><a href="about.html">自己紹介</a></li>
          <li><a href="works.html">制作実績</a></li>
          <li><a href="discord-bot.html">Bot制作</a></li>
          <li><a href="discord.html">Discord依頼</a></li>
          <li><a href="sns.html">SNS</a></li>
          <li><a href="contact.html" aria-current="page">お問い合わせ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-header">
        <div>
          <p class="eyebrow">Contact</p>
          <h1>お問い合わせ</h1>
        </div>
        <p>ご質問やご依頼など、お気軽にご連絡ください。入力いただいたメールアドレス宛に返信します。</p>
      </div>

      <form class="contact-form" action="https://formspree.io/f/mqeazwer" method="POST">
        <label>
          お名前
          <input type="text" name="name" placeholder="例: KaN" required>
        </label>
        <label>
          メールアドレス
          <input type="email" name="email" placeholder="example@example.com" required>
        </label>
        <label>
          お問い合わせ内容
          <textarea name="message" rows="6" placeholder="ご用件をご記入ください。" required></textarea>
        </label>
        <button type="submit">送信する</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">&copy; 2026 KaN Official Site</footer>
</body>
</html>
